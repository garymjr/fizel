tracker_defaults:
  kind: fizzy
  api_key: $FIZZY_TOKEN
  active_states:
    - Todo
    - In Progress
  terminal_states:
    - Done
    - Not Now
settings:
  polling:
    interval_ms: 5000
  workspace:
    root: ~/code/fizel-workspaces
  agent:
    max_concurrent_agents: 4
    max_turns: 5
  codex:
    command: codex app-server
    approval_policy: never
    thread_sandbox: workspace-write
watched_repos:
  - key: api
    path: ~/code/api
  - key: web
    path: ~/code/web
